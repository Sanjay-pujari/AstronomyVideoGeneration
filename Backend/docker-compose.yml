version: "3.9"
services:
  postgres:
    image: postgres:16
    container_name: astronomy-media-postgres
    environment:
      POSTGRES_DB: astronomy_media_factory
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports: ["5432:5432"]

  azurite:
    image: mcr.microsoft.com/azure-storage/azurite
    command: "azurite --blobHost 0.0.0.0 --queueHost 0.0.0.0"
    ports: ["10000:10000", "10001:10001"]

  skyfield-sidecar:
    build:
      context: ./python/skyfield_sidecar
    ports: ["8010:8010"]
